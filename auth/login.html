<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }
    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
    }
    .card {
      width: 320px;
      padding: 24px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: white;
    }
    button {
      background: #4d4dff;
      border: none;
      cursor: pointer;
      margin-top: 14px;
    }
    a {
      display: block;
      margin-top: 12px;
      color: #8ab4ff;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" method="POST" action="/login">
      <h1>Вход</h1>
      <input name="username" placeholder="Ник" autocomplete="username" required />
      <input name="password" type="password" placeholder="Пароль" autocomplete="current-password" required />
      <button type="submit">Войти</button>
      <a href="/auth/register.html">Нет аккаунта? Регистрация</a>
    </form>
  </div>
</body>
</html>
